  <g stroke="#60a5fa" stroke-width="3" stroke-linecap="round">
    <line x1="32" y1="32" x2="14" y2="15" />
    <line x1="32" y1="32" x2="50" y2="15" />
    <line x1="32" y1="32" x2="15" y2="50" />
    <line x1="32" y1="32" x2="49" y2="49" />
    <line x1="14" y1="15" x2="15" y2="50" />
